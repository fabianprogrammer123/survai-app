<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 42" fill="white">
  <!-- Stanford HAI - Human-Centered Artificial Intelligence -->

  <!-- Simplified HAI icon: abstract neural/human connection -->
  <g transform="translate(4, 5)">
    <circle cx="14" cy="14" r="13" fill="none" stroke="white" stroke-width="1.6"/>
    <!-- Simplified human silhouette -->
    <circle cx="10" cy="10" r="2.8" fill="white"/>
    <path d="M5,22 Q5,16 10,16 Q15,16 15,22" fill="white"/>
    <!-- AI/neural dots -->
    <circle cx="21" cy="9" r="2" fill="white"/>
    <circle cx="20" cy="18" r="1.5" fill="white"/>
    <!-- Connection line -->
    <line x1="21" y1="11" x2="20" y2="16.5" stroke="white" stroke-width="1"/>
  </g>

  <!-- "Stanford" serif wordmark -->
  <text x="38" y="22" font-family="Georgia, 'Times New Roman', 'Palatino Linotype', serif" font-size="21" letter-spacing="0.3" fill="white">Stanford</text>

  <!-- Divider line -->
  <line x1="146" y1="6" x2="146" y2="36" stroke="white" stroke-width="0.8" opacity="0.35"/>

  <!-- "HAI" bold sans-serif -->
  <text x="155" y="24" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="20" letter-spacing="1.5" fill="white">HAI</text>

  <!-- Subtitle -->
  <text x="38" y="37" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="300" font-size="6.5" letter-spacing="1.2" fill="white" opacity="0.55">Human-Centered Artificial Intelligence</text>
</svg>