name: Deploy to Cloud Run

on:
  # Auto-deploy on main push. Feature branches push to GitHub but do NOT
  # auto-deploy — merging to main is the "go live" trigger.
  push:
    branches: [main]
  # Manual trigger from the Actions tab.
  workflow_dispatch:

# Only one deploy can run at a time. If a new commit lands while a deploy
# is in-flight, the new one waits; the in-flight one keeps going.
concurrency:
  group: cloud-run-deploy
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write   # required for Workload Identity Federation

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth to GCP (Workload Identity Federation)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy
        run: |
          gcloud run deploy survai \
            --source . \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 1Gi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 10 \
            --concurrency 80 \
            --timeout 120 \
            --project survai-app \
            --set-env-vars "NEXT_PUBLIC_SUPABASE_URL=https://shgsuahugiiuyopwyxtp.supabase.co,NEXT_PUBLIC_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNoZ3N1YWh1Z2lpdXlvcHd5eHRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0Njc0MTgsImV4cCI6MjA5MjA0MzQxOH0.fYpuzVnhhIy3sICHVLaEcXgT3MtAV1r4O-QqaTMHEvY" \
            --set-secrets "OPENAI_API_KEY=openai-api-key:latest,ELEVENLABS_API_KEY=elevenlabs-api-key:latest,ANTHROPIC_API_KEY=anthropic-api-key:latest,ELEVENLABS_WEBHOOK_SECRET=elevenlabs-webhook-secret:latest"

      - name: Smoke test
        run: |
          URL=$(gcloud run services describe survai --region us-central1 --project survai-app --format='value(status.url)')
          echo "Deployed to: $URL"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/api/health")
          echo "Health check: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed"
            exit 1
          fi
